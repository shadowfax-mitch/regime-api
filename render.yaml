# Render deployment configuration
# Deploy: Connect GitHub repo to Render and it auto-deploys on push

services:
  - type: web
    name: regime-api
    env: python
    region: oregon
    plan: free  # Start with free tier
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REGIME_DATA_PATH
        value: /opt/render/project/data/regime_data.csv
      - key: ADMIN_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    autoDeploy: true
